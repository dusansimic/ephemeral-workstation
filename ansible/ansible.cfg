[defaults]
inventory = inventory/hosts.ini
remote_user = root
roles_path = roles
host_key_checking = False
retry_files_enabled = False
# Private key path comes from the generated inventory (ansible_ssh_private_key_file),
# set via var.ssh_private_key_file in Terraform.

[ssh_connection]
pipelining = True
# Ignore the user's ~/.ssh/config so a complicated personal config can't
# interfere; only this key + inventory host are used. Drop `-F /dev/null`
# if you rely on a ProxyJump/bastion defined in your ssh config.
ssh_args = -F /dev/null -o ControlMaster=auto -o ControlPersist=60s
