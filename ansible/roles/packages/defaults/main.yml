---
workstation_packages:
  - git
  - fish
  - podman
  - tmux
  - htop
  - curl
  - acl   # lets Ansible become an unprivileged user (setfacl on temp files)
  # Node.js + npm — used to install Claude Code globally
  - nodejs
  - npm
  # Docker CE (from the official repo added by the repositories role)
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# npm package for Claude Code, installed globally
workstation_claude_code_package: "@anthropic-ai/claude-code"
