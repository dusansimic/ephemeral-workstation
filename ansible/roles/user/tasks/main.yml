---
- name: Create workstation user
  ansible.builtin.user:
    name: "{{ workstation_user }}"
    password: "{{ workstation_password | password_hash('sha512') }}"
    groups: docker
    append: true
    shell: "{{ workstation_user_shell }}"
    create_home: true
    state: present

- name: Add SSH public key for the user
  ansible.posix.authorized_key:
    user: "{{ workstation_user }}"
    key: "{{ workstation_ssh_key }}"
    state: present
