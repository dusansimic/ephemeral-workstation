---
- name: Create workstation user
  ansible.builtin.user:
    name: "{{ workstation_user }}"
    # No password is set — login is SSH-key only (see the ssh role).
    groups: docker,wheel
    append: true
    shell: "{{ workstation_user_shell }}"
    create_home: true
    state: present

- name: Add SSH public key for the user
  ansible.posix.authorized_key:
    user: "{{ workstation_user }}"
    key: "{{ workstation_ssh_key }}"
    state: present

- name: Grant passwordless sudo
  community.general.sudoers:
    name: "{{ workstation_user }}-nopasswd"
    user: "{{ workstation_user }}"
    commands: ALL
    nopassword: true
    state: present
