---
- name: Provision ephemeral workstation
  hosts: workstation
  become: true

  vars:
    workstation_user: dusan
    # Plaintext for an ephemeral box only — hashed by the user role. Do NOT reuse for anything persistent.
    workstation_password: password
    # Same public key injected by Terraform for root bootstrap.
    workstation_ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... you@example.com"

  roles:
    - repositories   # add extra repos (Docker CE)
    - packages       # install base packages + Docker (creates docker group)
    - update         # full system upgrade
    - user           # create user, add to docker group, ssh key, password
    - directories    # create ~/Projects
