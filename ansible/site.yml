---
- name: Provision ephemeral workstation
  hosts: workstation
  become: true

  vars:
    workstation_user: dusan
    # workstation_ssh_key comes from inventory/group_vars/workstation.yml (generated by Terraform).

  roles:
    - repositories   # add extra repos (Docker CE)
    - packages       # install base packages + Docker (creates docker group)
    - update         # full system upgrade
    - github_releases # install tools from GitHub releases (eza, ...)
    - user           # create user, docker group, ssh key, passwordless sudo
    - directories    # create ~/Projects
    - fish           # fisher + fish plugins for the user
    - ssh            # enforce key-only SSH auth
